name: PocketDev
options:
  bundleIdPrefix: com.pocketdev
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.4"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
    SUPPORTS_MACCATALYST: NO

configs:
  Debug: debug
  Release: release

targets:
  PocketDev:
    type: application
    platform: iOS
    sources:
      - path: Sources/PocketDevApp
      - path: Sources/Shared
      - path: Sources/PlatformAbstraction
      - path: Sources/ContainerRuntime
      - path: Sources/TerminalUI
      - path: Sources/FileManager
      - path: Sources/NetworkManager
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pocketdev.app
        CODE_SIGN_ENTITLEMENTS: PocketDev.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationAllButUpsideDown"
        INFOPLIST_KEY_CFBundleDisplayName: PocketDev
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        # Link zlib for EXT4Builder
        OTHER_LDFLAGS: "-lz"

  PocketDevTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: PocketDev
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pocketdev.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PocketDev.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PocketDev"
        BUNDLE_LOADER: "$(TEST_HOST)"
